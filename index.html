<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Love Project</title>
    <style>
        /* كود التصميم CSS */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffeef2;
            overflow: hidden;
            font-family: sans-serif;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 85%;
            position: relative;
        }
        img { width: 150px; margin-bottom: 20px; border-radius: 10px; }
        h1 { color: #ff4d6d; font-size: 1.5rem; margin-bottom: 25px; }
        .btn-group { display: flex; justify-content: center; gap: 15px; }
        button {
            padding: 10px 25px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
        #yes-btn { background-color: #ff4d6d; color: white; }
        #no-btn { 
            background-color: #eee; 
            color: #333; 
            position: absolute; 
            transition: 0.1s; /* سرعة استجابة الحركة */
        }
    </style>
</head>
<body>

    <div class="card">
        <img id="main-gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueW9ycXN6eW9ycXN6eW9ycXN6eW9ycXN6eW9ycXN6eW9yJmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/0vSUIE7yKzH36/giphy.gif">
        <h1 id="question">هل تحبني؟</h1>
        <div class="btn-group">
            <button id="yes-btn">نعم</button>
            <button id="no-btn">لا</button>
        </div>
    </div>

    <script>
        // كود التفاعل JavaScript
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const question = document.getElementById('question');
        const mainGif = document.getElementById('main-gif');

        function moveButton() {
            // حساب المساحة المتاحة للتحرك داخل الشاشة فقط
            const maxWidth = window.innerWidth - noBtn.offsetWidth - 20;
            const maxHeight = window.innerHeight - noBtn.offsetHeight - 20;

            const randomX = Math.floor(Math.random() * maxWidth);
            const randomY = Math.floor(Math.random() * maxHeight);

            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // للهواتف: نستخدم 'touchstart' ليعمل الزر عند اللمس
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton();
        });
        
        // للكمبيوتر (اختياري)
        noBtn.addEventListener('mouseover', moveButton);

        yesBtn.addEventListener('click', () => {
            question.innerHTML = "أنا أيضاً أحبك! ❤️";
            mainGif.src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueW9ycXN6eW9ycXN6eW9ycXN6eW9ycXN6eW9ycXN6eW9yJmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/L40pD01I39L5C/giphy.gif";
            noBtn.style.display = 'none';
        });
    </script>
</body>
</html>
